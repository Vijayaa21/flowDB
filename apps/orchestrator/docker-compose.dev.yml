services:
  postgres:
    image: postgres:16-alpine
    container_name: flowdb-orchestrator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowdb_meta
    ports:
      - "55432:5432"
    volumes:
      - flowdb_orchestrator_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flowdb_meta"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  flowdb_orchestrator_pgdata:
